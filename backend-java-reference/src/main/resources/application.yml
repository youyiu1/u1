server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 2048

spring:
  application:
    name: neighborhood-app

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/neighborhood_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: NeighborhoodHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: caffeine
    cache-names:
      - hotData
      - stateData

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          max-interval: 5000ms
          multiplier: 2

  mail:
    host: smtp.qq.com
    port: 587
    username: 1668820870@qq.com
    password: mkfxxjnwxjzacbih

mybatis-plus:
  type-aliases-package: com.neighborhood.app.entity
  type-handler-strategy: other
  auto-result-map: true
  type-handlers-package: com.neighborhood.app.handler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

cache:
  user:
    ttl: 1800
  list:
    ttl: 600
  detail:
    ttl: 900
  hot:
    ttl: 300

jwt:
  secret: neighborhood-app-secret-key-2024-very-long-key-for-hs256
  expiration: 86400000

rustfs:
  endpoint: http://localhost:9000
  access-key: 4a36qGmg5XTWojNU2Lb7
  secret-key: 4tOJYvgIXHWw7GD2j0deLmA9ZnFrqyxBb1UaC6sl
  bucket: neighborhood

app:
  cache:
    caffeine:
      initial-capacity: 256
      maximum-size: 5000
      expire-after-write-seconds: 45
  messaging:
    rabbit:
      enabled: false
      notification-queue: neighborhood.notification.write
      notification-exchange: neighborhood.notification.exchange
      notification-routing-key: notification.write
      admin-log-queue: neighborhood.admin.log.write
      admin-log-exchange: neighborhood.admin.log.exchange
      admin-log-routing-key: admin.log.write

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
