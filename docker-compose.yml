services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    container_name: neighborhood-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend-java-reference
      dockerfile: Dockerfile
    container_name: neighborhood-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/neighborhood_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_RABBIT_ENABLED: ${APP_RABBIT_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-before-production}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      PUBLIC_FILE_BASE_URL: ${PUBLIC_FILE_BASE_URL:-http://localhost/api/file}
      CDN_BASE_URL: ${CDN_BASE_URL:-}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost,http://localhost:80}
      MANAGEMENT_EXPOSED_ENDPOINTS: ${MANAGEMENT_EXPOSED_ENDPOINTS:-health,info,prometheus}
      MANAGEMENT_PROMETHEUS_ENABLED: ${MANAGEMENT_PROMETHEUS_ENABLED:-true}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT:-http://rustfs:9000}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-neighborhood}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: neighborhood-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: neighborhood_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-java-reference/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neighborhood-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: neighborhood-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: neighborhood-rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-yuan}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-2006yyy}
      RUSTFS_ADDRESS: :9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: :9001
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: neighborhood-prometheus
    depends_on:
      backend:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/docker-prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: neighborhood-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123456}
    volumes:
      - ./deploy/docker-grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./deploy/docker-grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yml:ro
      - ./deploy/grafana-dashboard-neighborhood.json:/etc/grafana/provisioning/dashboards/neighborhood.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_logs:
  mysql_data:
  redis_data:
  rabbitmq_data:
  rustfs_data:
  prometheus_data:
  grafana_data:
